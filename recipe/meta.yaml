{% set name = "lumen" %}
{% set version = "1.0.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bfcd83ecf4b78887b027598a86ddd864e81df8da703f0ad2e8b8fabed15c82a3

build:
  number: 2

outputs:
  - name: {{ name|lower }}
    build:
      noarch: python
      entry_points:
        - lumen = lumen.command:main
    script: build.sh

    requirements:
      host:
        - python {{ python_min }}
        - pip
        - hatchling
        - hatch-vcs
      run:
        - bokeh
        - numpy
        - sqlglot
        - chardet
        - python >={{ python_min }}
        - panel >=1.8.7
        - hvplot
        - holoviews >=1.17.0
        - pandas
        - packaging
        - intake <2
        - jinja2 >3.0
        - pyyaml
        - param >=2.2.1
        - duckdb >=1.2.0
        - griffe
        - instructor >=1.11.1
        - markitdown
        - nbformat
        - panel-graphic-walker >=0.6.4
        - panel-material-ui >=0.8.1
        - panel-splitjs
        - pyarrow
        - pydantic >=2.8.0
        - pydantic-extra-types
        - semchunk
        - sqlglotrs
        - tabulate
        - tiktoken
    
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
      commands:
        #- pip check
        - lumen --help

    about:
      home: https://github.com/holoviz/lumen
      summary: Illuminate your data.
      description: |
        Lumen is a fully open-source and extensible agent based framework
        for chatting with data, text-to-SQL and for retrieval augmented
        generation (RAG). It implements a declarative specfication for
        expressing data pipelines, visualizations and dashboards.
      license: BSD-3-Clause
      license_file: LICENSE
      doc_url: https://lumen.holoviz.org/
      dev_url: https://github.com/holoviz/lumen

# This recipe builds multiple outputs:
# - lumen: The main package with core AI functionality
# - lumen-ai-local: Metapackage that adds huggingface_hub for local AI models
# - lumen-ai-openai: Metapackage that adds OpenAI support
# - lumen-ai-mistralai: Metapackage that adds MistralAI support
# - lumen-ai-anthropic: Metapackage that adds Anthropic support

  - name: {{ name|lower }}-ai-local
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - huggingface_hub
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with huggingface_hub for local AI models'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-openai
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - openai
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with OpenAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-mistralai
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - mistralai
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with MistralAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-anthropic
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - anthropic
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with Anthropic support'
      license: BSD-3-Clause
      license_family: BSD

about:
  home: https://github.com/holoviz/lumen
  summary: Illuminate your data.
  description: |
    Lumen is a fully open-source and extensible agent based framework
    for chatting with data, text-to-SQL and for retrieval augmented
    generation (RAG). It implements a declarative specfication for
    expressing data pipelines, visualizations and dashboards.
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://lumen.holoviz.org/
  dev_url: https://github.com/holoviz/lumen

extra:
  recipe-maintainers:
    - ahuang11
    - hoxbro
    - philippjfr
