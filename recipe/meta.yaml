      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-google
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - google-genai >=1.56.0
        - jsonref
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with Google Gemini support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-litellm
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - litellm
    test:
      imports:
        - lumen
