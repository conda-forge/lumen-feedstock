        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with Anthropic support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-transformers
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen-ai-local', exact=True) }}
