{% set name = "lumen" %}
{% set version = "1.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 749e60a6e1137480e5cc8cedc5b4f7768183c0e076938a84ffbb83f1de018825

build:
  number: 0
  noarch: python

outputs:
  - name: {{ name|lower }}
    build:
      noarch: python
      entry_points:
        - lumen = lumen.command.ai:main
        - lumen-ai = lumen.command.ai:main
        - lumen-spec = lumen.command:main
    script: build_lumen.sh

    requirements:
      host:
        - python {{ python_min }}
        - pip
        - hatchling
        - hatch-vcs
      run:
        - bokeh
        - chardet
        - duckdb >=1.2.0
        - griffe
        - holoviews >=1.17.0
        - hvplot
        - instructor >=1.14.3
        - intake <2
        - jinja2 >3.0
        - markitdown
        - nbformat
        - numpy
        - packaging
        - pandas
        - panel >=1.7.5
        - panel-graphic-walker >=0.6.4
        - panel-material-ui >=0.8.1
        - panel-splitjs >=0.3.2
        - param >=2.2.1
        - pyarrow
        - pydantic >=2.8.0
        - pydantic-extra-types
        - python >={{ python_min }}
        - semchunk
        - sqlglot
        - sqlglotrs
        - tabulate
        - tiktoken
        - vl-convert-python

    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
      commands:
        #- pip check
        - lumen --help

    about:
      home: https://github.com/holoviz/lumen
      summary: Illuminate your data.
      description: |
        Lumen is a fully open-source and extensible agent based framework
        for chatting with data, text-to-SQL and for retrieval augmented
        generation (RAG). It implements a declarative specfication for
        expressing data pipelines, visualizations and dashboards.
      license: BSD-3-Clause
      license_file: LICENSE
      doc_url: https://lumen.holoviz.org/
      dev_url: https://github.com/holoviz/lumen

  - name: {{ name|lower }}-ai-local
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - huggingface_hub
        - hf-xet
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with huggingface_hub for local AI models'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-openai
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - openai
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with OpenAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-mistralai
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - mistralai
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with MistralAI support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-bedrock
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
        - boto3 >=1.42.23
    test:
      imports:
        - lumen
      requires:
        - pip
        - python {{ python_min }}
    about:
      home: https://github.com/holoviz/lumen
      summary: 'Lumen with AWS Bedrock support'
      license: BSD-3-Clause
      license_family: BSD

  - name: {{ name|lower }}-ai-anthropic
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('lumen', exact=True) }}
